# Claude SQL MCP Server - Multiple Databases Configuration
# Example configuration for working with multiple databases simultaneously

# Production PostgreSQL Database (READ-ONLY)
[database.production]
type=postgresql
host=production-db.company.com
port=5432
database=production_app
username=readonly_user
password=secure_readonly_password
ssl=true
select_only=true
timeout=30000

# Development MySQL Database (FULL ACCESS)
[database.development]
type=mysql
host=localhost
port=3306
database=dev_app
username=dev_user
password=dev_password
ssl=false
select_only=false
timeout=30000

# Local SQLite for Testing
[database.testing]
type=sqlite
file=./data/test.db
select_only=false
timeout=10000

# Analytics Data Warehouse (READ-ONLY)
[database.analytics]
type=postgresql
host=analytics-db.company.com
port=5432
database=data_warehouse
username=analyst_user
password=analyst_password
ssl=true
select_only=true
timeout=45000

# Security Settings
[security]
max_joins=15
max_subqueries=8
max_unions=5
max_group_bys=8
max_complexity_score=150
max_query_length=15000

# Extension Settings
[extension]
max_rows=2000
query_timeout=45000
max_batch_size=15
debug=false

# Instructions:
# 1. Copy this file to your project root as config.ini:
#    cp examples/basic-setup/multiple-databases.ini config.ini
#
# 2. Update each database section with your actual connection details
#
# 3. Create the SQLite test database:
#    mkdir -p data
#    sqlite3 data/test.db "CREATE TABLE test_users (id INTEGER PRIMARY KEY, name TEXT);"
#
# 4. Start the server:
#    npm start
#
# 5. Test queries in Claude:
#    "Show me tables available in the production database"
#    "Compare user counts between development and production databases"
#    "Run a quick test query on the testing database"
#
# Database Usage Patterns:
# - production: Read-only queries on live data
# - development: Full access for development work
# - testing: Local SQLite for quick tests and experiments
# - analytics: Read-only access to data warehouse
#
# Security Notes:
# - Production and analytics databases use SELECT-only mode
# - Development allows full access for testing
# - Different timeout values based on expected query complexity
# - Higher security limits to accommodate multi-database queries