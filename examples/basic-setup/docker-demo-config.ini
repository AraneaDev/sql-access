# Configuration for Docker Compose Demo Environment
# Use with docker-compose-demo.yml for quick testing

# PostgreSQL Demo Database
[database.postgres]
type=postgresql
host=localhost
port=5432
database=demo_db
username=demo_user
password=demo_password
ssl=false
select_only=false
timeout=30000

# MySQL Demo Database
[database.mysql]
type=mysql
host=localhost
port=3306
database=demo_db
username=demo_user
password=demo_password
ssl=false
select_only=false
timeout=30000

# Security Settings (Relaxed for demo)
[security]
max_joins=10
max_subqueries=5
max_unions=3
max_group_bys=5
max_complexity_score=100
max_query_length=10000

# Extension Settings
[extension]
max_rows=1000
query_timeout=30000
max_batch_size=10
debug=true

# Instructions:
# This configuration is designed to work with the Docker Compose demo environment.
# 
# 1. First, start the Docker demo environment:
#    docker-compose -f examples/basic-setup/docker-compose-demo.yml up -d
#
# 2. Wait for the databases to initialize (check logs):
#    docker-compose -f examples/basic-setup/docker-compose-demo.yml logs -f
#
# 3. Copy this config:
#    cp examples/basic-setup/docker-demo-config.ini config.ini
#
# 4. Start the SQL MCP Server:
#    npm start
#
# 5. Test queries:
#    "Show me all tables in both postgres and mysql databases"
#    "Compare the schemas between the two databases"
#
# Note: Both databases allow full access for demo purposes.
# Debug mode is enabled for detailed logging.