# Claude SQL MCP Server - Simple SQLite Configuration
# Perfect for testing and local development

# SQLite Database Configuration
[database.local]
type=sqlite
file=./data/example.db
select_only=false
timeout=10000

# Security Settings (optional, defaults shown)
[security]
max_joins=10
max_subqueries=5
max_unions=3
max_group_bys=5
max_complexity_score=100
max_query_length=10000

# Extension Settings
[extension]
max_rows=1000
query_timeout=30000
max_batch_size=10
debug=false

# Instructions:
# 1. Copy this file to your project root as config.ini:
#    cp examples/basic-setup/simple-sqlite.ini config.ini
#
# 2. Create the data directory:
#    mkdir -p data
#
# 3. Create a sample SQLite database (optional):
#    sqlite3 data/example.db "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, email TEXT);"
#    sqlite3 data/example.db "INSERT INTO users (name, email) VALUES ('John Doe', 'john@example.com');"
#    sqlite3 data/example.db "INSERT INTO users (name, email) VALUES ('Jane Smith', 'jane@example.com');"
#
# 4. Start the server:
#    npm start
#
# 5. Test with a simple query in Claude:
#    "Show me all users from the local database"
#
# Note: This configuration allows full access (INSERT, UPDATE, DELETE).
# For read-only access, change select_only=true