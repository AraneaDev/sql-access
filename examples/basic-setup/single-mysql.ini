# Claude SQL MCP Server - Single MySQL Configuration
# Basic setup for connecting to a MySQL/MariaDB database

# MySQL Database Configuration
[database.primary]
type=mysql
host=localhost
port=3306
database=your_database_name
username=your_username
password=your_password
ssl=false
select_only=true
timeout=30000

# Security Settings
[security]
max_joins=10
max_subqueries=5
max_unions=3
max_group_bys=5
max_complexity_score=100
max_query_length=10000

# Extension Settings
[extension]
max_rows=1000
query_timeout=30000
max_batch_size=10
debug=false

# Instructions:
# 1. Copy this file to your project root as config.ini:
#    cp examples/basic-setup/single-mysql.ini config.ini
#
# 2. Update the database connection details above:
#    - host: Your MySQL server hostname/IP
#    - port: Usually 3306 (default MySQL port)
#    - database: Your database name
#    - username: MySQL user with appropriate permissions
#    - password: User password
#    - ssl: Set to true if your server requires SSL
#
# 3. Start the server:
#    npm start
#
# 4. Test the connection:
#    npm run test
#
# 5. Try a query in Claude:
#    "Show me the database schema for the primary database"
#
# Security Notes:
# - This config uses SELECT-only mode for safety
# - User should have SELECT permissions on desired tables/views
# - For full access, change select_only=false (use with caution)
#
# Common MySQL/MariaDB Permissions:
# GRANT SELECT ON database_name.* TO 'username'@'host';
# For full access: GRANT ALL PRIVILEGES ON database_name.* TO 'username'@'host';