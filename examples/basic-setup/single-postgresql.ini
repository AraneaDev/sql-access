# Claude SQL MCP Server - Single PostgreSQL Configuration
# Basic setup for connecting to a PostgreSQL database

# PostgreSQL Database Configuration
[database.primary]
type=postgresql
host=localhost
port=5432
database=your_database_name
username=your_username
password=your_password
ssl=false
select_only=true
timeout=30000

# Security Settings
[security]
max_joins=10
max_subqueries=5
max_unions=3
max_group_bys=5
max_complexity_score=100
max_query_length=10000

# Extension Settings
[extension]
max_rows=1000
query_timeout=30000
max_batch_size=10
debug=false

# Instructions:
# 1. Copy this file to your project root as config.ini:
#    cp examples/basic-setup/single-postgresql.ini config.ini
#
# 2. Update the database connection details above:
#    - host: Your PostgreSQL server hostname/IP
#    - port: Usually 5432 (default PostgreSQL port)
#    - database: Your database name
#    - username: Database user with appropriate permissions
#    - password: User password
#    - ssl: Set to true if your server requires SSL
#
# 3. Start the server:
#    npm start
#
# 4. Test the connection:
#    npm run test
#
# 5. Try a query in Claude:
#    "Show me the first 10 rows from any table in the primary database"
#
# Security Notes:
# - This config uses SELECT-only mode for safety
# - User should have SELECT permissions on desired tables
# - For full access, change select_only=false (use with caution)
#
# SSL Configuration:
# For secure connections, set ssl=true
# Additional SSL options can be configured programmatically