# Prometheus Configuration for SQL MCP Server Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sql-mcp-server-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules and evaluate them according to the global 'evaluation_interval'
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Scrape configuration
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics

  # SQL MCP Server main metrics
  - job_name: 'sql-mcp-server'
    static_configs:
      - targets: ['host.docker.internal:3001']  # Adjust for your SQL MCP Server
    scrape_interval: 10s
    metrics_path: /metrics
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']

  # System metrics via Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    scrape_timeout: 10s

  # AlertManager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 30s

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s
    metrics_path: /metrics

  # Database-specific exporters (uncomment as needed)
  
  # PostgreSQL Exporter
  # - job_name: 'postgres-exporter'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #   scrape_interval: 15s

  # MySQL Exporter  
  # - job_name: 'mysql-exporter'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
  #   scrape_interval: 15s

  # Redis Exporter
  # - job_name: 'redis-exporter'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #   scrape_interval: 15s

  # Custom application metrics (if you have additional services)
  - job_name: 'custom-metrics'
    static_configs:
      - targets: []  # Add your custom metric endpoints here
    scrape_interval: 15s
    honor_labels: true

  # Elasticsearch metrics (for log monitoring)
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    scrape_interval: 30s
    metrics_path: /_prometheus/metrics

# Remote write configuration (for long-term storage - optional)
# remote_write:
#   - url: "https://your-remote-prometheus-endpoint/api/v1/write"
#     headers:
#       authorization: "Bearer YOUR_TOKEN_HERE"

# Remote read configuration (for querying external Prometheus - optional)  
# remote_read:
#   - url: "https://your-remote-prometheus-endpoint/api/v1/read"
#     headers:
#       authorization: "Bearer YOUR_TOKEN_HERE"

# Configuration for recording rules (optional)
# Used to pre-compute frequently used or expensive queries
recording_rules:
  - name: sql_mcp_server_recording_rules
    interval: 30s
    rules:
      - record: sql_mcp:query_rate_5m
        expr: rate(sql_mcp_queries_total[5m])
      
      - record: sql_mcp:error_rate_5m
        expr: rate(sql_mcp_queries_total{status="error"}[5m])
      
      - record: sql_mcp:success_rate_5m
        expr: rate(sql_mcp_queries_total{status="success"}[5m])
      
      - record: sql_mcp:query_duration_p95
        expr: histogram_quantile(0.95, rate(sql_mcp_query_duration_seconds_bucket[5m]))
      
      - record: sql_mcp:query_duration_p99
        expr: histogram_quantile(0.99, rate(sql_mcp_query_duration_seconds_bucket[5m]))
      
      - record: sql_mcp:connection_utilization
        expr: sql_mcp_connections_active / sql_mcp_connections_max * 100

# Storage configuration
storage:
  # Retain data for 15 days (adjust based on your needs)
  tsdb:
    retention.time: 15d
    retention.size: 10GB
  
# Configuration validation